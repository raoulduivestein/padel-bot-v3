server {
    listen 80;
    server_name padel-bot.nl www.padel-bot.nl;

    # Certbot can replace this block with HTTPS redirects after certificate setup.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name padel-bot.nl www.padel-bot.nl;

    ssl_certificate /etc/letsencrypt/live/padel-bot.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/padel-bot.nl/privkey.pem;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Invite links must be reachable by players without the admin login.
    # The random token in /invite/<token> is the access key for that invite.
    location ^~ /invite/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:18018;
    }

    # Takeover links must also be reachable by players without the admin login.
    location ^~ /takeover/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:18018;
    }

    # Signup links are public token links for players joining booked courts.
    location ^~ /signup/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:18018;
    }

    # Everything else is the admin tool and stays locked.
    location / {
        auth_basic "Padel Bot";
        auth_basic_user_file /etc/nginx/.padel-bot.htpasswd;
        proxy_pass http://127.0.0.1:18018;
    }
}
